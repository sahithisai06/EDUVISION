<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduVision — Account</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-shell ledger-bg">

  <div class="topbar">
    <div class="brand">
      <a href="{{ url_for('dashboard') }}" style="color:var(--indigo-deep); display:flex; align-items:center; gap:6px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <div class="mark" style="font-size:18px;">Account</div>
    </div>
    <div style="width:38px;"></div>
  </div>

  <div class="account-card">
    <div class="avatar-ring">{{ (user['name'] or 'U')[0] }}</div>
    <div class="account-name">{{ user['name'] }}</div>
    <div class="account-email">{{ user['email'] }}</div>
  </div>

  <div class="info-list">
    <div class="info-row"><span class="k">Sheets scanned by you</span><span class="v">{{ scan_count }}</span></div>
    <div class="info-row"><span class="k">Account created</span><span class="v">{{ user['created_at'][:10] }}</span></div>
    <div class="info-row"><span class="k">Storage</span><span class="v">Local Excel + SQLite</span></div>
  </div>

  <a href="{{ url_for('logout') }}"><button class="signout-btn">Sign out</button></a>

  <nav class="bottom-nav">
    <a href="{{ url_for('dashboard') }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>
      Home
    </a>
    <a href="{{ url_for('scan') }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M4 8V6a2 2 0 0 1 2-2h2M20 8V6a2 2 0 0 0-2-2h-2"/></svg>
      Scan
    </a>
    <a href="{{ url_for('my_sheets') }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/></svg>
      Sheets
    </a>
    <a class="active" href="{{ url_for('account') }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/></svg>
      Account
    </a>
  </nav>
</div>
</body>
</html>
